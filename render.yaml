services:
  - type: web
    name: hermes-agent
    env: docker          # tells Render to build from the Dockerfile
    plan: free
    # ---- Use the Render-specific Dockerfile ----
    dockerfilePath: Dockerfile.render
    # ---- Persistent disk (1 GB) mounted at /opt/data ----
    disk:
      name: hermes-data
      mountPath: /opt/data   # MUST match HERMES_HOME in Dockerfile
      size: 1GB
    # ---- Environment variables (set in Render Dashboard) ----
    envVars:
      - key: OPENROUTER_API_KEY
        # Get a free key at https://openrouter.ai/keys
      - key: TELEGRAM_BOT_TOKEN
        # Get from @BotFather → /newbot
      - key: TELEGRAM_ALLOWED_USERS
        # Your Telegram user ID (get with @userinfobot) - required for security
        # Example: 123456789
      - key: API_SERVER_KEY
        # Optional: Custom API server key (if not set, one will be auto-generated)
        # Must be 32-character hex string if provided
        # Example: a1b2c3d4e5f67890123456789abcdef0123456789abcdef0123456789abcdef0
    # ---- Port configuration ----
    # Explicitly set port to 10000 to match our PORT env var default
    port: 10000
    # ---- No custom command needed – the Dockerfile’s ENTRYPOINT runs everything ----
