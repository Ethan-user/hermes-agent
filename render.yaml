services:
  - type: web
    name: hermes-agent
    env: docker
    plan: free
    disk:
      name: hermes-data
      mountPath: /opt/data      # MUST match Dockerfile's HERMES_HOME
      size: 1GB
    envVars:
      - key: OPENROUTER_API_KEY
        # Set this in Render Dashboard → Service → Environment → Add Variable
      - key: TELEGRAM_BOT_TOKEN
        # Set this in Render Dashboard → Service → Environment → Add Variable
    command: ["hermes", "gateway", "run"]  # 🔑 FOREGROUND (critical for s6)
